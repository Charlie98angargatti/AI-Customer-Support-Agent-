<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- <link rel="stylesheet" href="style.css" /> -->
  <!-- <link rel="stylesheet" href="style.css"> -->
   <link rel="stylesheet" href="/static/customer/style.css">
</head>
<body>

  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <span class="brand-name">ShopEase</span>
      <span class="brand-tag">Support</span>
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Connecting…</span>
    </div>
  </header>

  <main class="chat-layout">

    <!-- Loading overlay while agent warms up -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-card">
        <div class="spinner"></div>
        <h3>Starting up…</h3>
        <p id="loadingMsg">The AI agent is warming up. This takes 30–60 seconds on first load.</p>
        <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
      </div>
    </div>

    <!-- Context strip -->
    <div class="context-strip">
      <div class="ctx-field">
        <label>Customer ID</label>
        <input id="ctxCid" type="text" placeholder="e.g. C001" maxlength="10" />
      </div>
      <div class="ctx-field">
        <label>Order ID</label>
        <input id="ctxOid" type="text" placeholder="e.g. ORD-1001" maxlength="12" />
      </div>
      <button class="btn-fill" id="ctxFillBtn">Insert into chat ↗</button>
      <div class="session-info">
        <span class="session-label">Session</span>
        <code id="sessionId">—</code>
      </div>
      <button class="btn-ghost btn-sm" id="newSessionBtn">+ New chat</button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="input-bar">
      <textarea id="chatInput" rows="1" placeholder="Describe your issue…" maxlength="1000"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span id="charCount">0 / 1000</span>
      <span>Enter to send · Shift+Enter for new line</span>
    </div>

  </main>

  <template id="typingTpl">
    <div class="message agent typing-msg" id="typingIndicator">
      <div class="avatar">AI</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
  </template>

  <script src="/static/customer/app.js"></script>
</body>
</html>
